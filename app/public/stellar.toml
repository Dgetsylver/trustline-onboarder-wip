# Example issuer stellar.toml advertising Trustline Onboarder support (SEP-1 + SEP-XXXX).
# Wallets/exchanges read [TRUSTLINE_ONBOARDER] to drive one-signature activation.

[[CURRENCIES]]
code = "EURCV"
issuer = "GCEYGIVOLAVBF2TG2RUSGTUJCIN75KEX3NGLMY4VPL4GFE5L355AXW3G"
display_decimals = 7
name = "EUR CoinVertible"

[TRUSTLINE_ONBOARDER]
ASSET_CODE = "EURCV"
ASSET_ISSUER = "GCEYGIVOLAVBF2TG2RUSGTUJCIN75KEX3NGLMY4VPL4GFE5L355AXW3G"
# SAC for the asset (deterministic from code+issuer); placeholder shown.
SAC = "C_REPLACE_WITH_EURCV_SAC"
# Trustline Authorizer (SAC admin) — regulated (AUTH_REQUIRED) assets only; omit for open assets.
# The live EURCV precursor is eurcv_auth:
AUTHORIZER = "CB2DHZMQHQE3TGUMD6BRM7UCJZNIPKDRVEQOWBIRRS3G2FZOGDTRKSB3"
# One-signature CAP-73 wrapper (deployed by this grant).
ONBOARD_WRAPPER = "C_REPLACE_WITH_ONBOARD_WRAPPER"
BACKENDS = ["cap73-onesig", "cap33-sponsored"]
